<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijkstra - Departamentos del Perú</title>
    <link rel="stylesheet" href="src/styles/style.css">
</head>
<body>
    <div id="notification-container" class="notification-container"></div>

    <div class="app-wrapper">
        <div class="sidebar">
            <div class="titulo">
                <h1>dijkstraRamosJ</h1>
            </div>

            <div>
                <label for="origen">Departamento de inicio</label>
                <select id="origen">
                    <option value="">-- Seleccionar --</option>
                </select>

                <label for="destino">Departamento destino</label>
                <select id="destino">
                    <option value="">-- Seleccionar --</option>
                </select>

                <button id="calcularRuta">Calcular ruta</button>
            </div>

            <div id="resultados" class="hidden">
                <h3>Resultados</h3>
                <div class="info-row">
                    <span>Distancia total:</span>
                    <span id="distanciaTotal">--</span>
                </div>
                <div class="info-row">
                    <span>Departamentos:</span>
                    <span id="numDepartamentos">--</span>
                </div>
                <ol id="trayecto"></ol>
            </div>

            <div class="leyenda">
                <div class="leyenda-item"><span class="punto inicio"></span>Inicio</div>
                <div class="leyenda-item"><span class="punto fin"></span>Destino</div>
                <div class="leyenda-item"><span class="punto ruta"></span>Ruta</div>
                <div class="leyenda-item"><span class="punto normal"></span>Departamento</div>
            </div>
        </div>

        <div class="map-area">
            <div id="map"></div>
            <div id="map-loading" class="map-loading">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <script src="src/config.js"></script>
    <script src="src/data/departamentos.js"></script>
    <script src="src/algorithms/dijkstra.js"></script>
    <script src="src/map/map.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
